<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/portfolio.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      /** Restores outgoing curtain colors before the destination first paints. */
      (() => {
        try {
          const key = "curtain-source-theme";
          const storedTheme = sessionStorage.getItem(key);
          if (!storedTheme) return;
          const theme = JSON.parse(storedTheme);
          sessionStorage.removeItem(key);
          if (!theme.background || !theme.solid) return;
          window.__curtainSourceTheme = theme;
          const root = document.documentElement.style;
          root.setProperty("--curtain-boot-bg", theme.background);
          root.setProperty("--curtain-boot-solid", theme.solid);
        } catch {}
      })();
    </script>
    <title>samudraam</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body class="is-loading">
    <div id="curtains" class="curtains--boot" aria-hidden="true"></div>
    <div class="invert-circle"></div>
    <nav class="pill-nav">
      <a href="index.html">home</a>
      <a href="about.html">about</a>
      <a href="projects.html">works</a>
      <a href="contact.html">contact</a>
    </nav>
    <div class="background">
      <video autoplay muted loop playsinline>
        <source src="wave.mp4" type="video/mp4" />
      </video>
    </div>
    <div class="container">
      <h1 class="distressed">
        <span>samudraam</span>
      </h1>
      <h2 class="subname">ramya samudrala</h2>
    </div>
    <script type="module" src="src/page-transitions.js"></script>
  </body>
</html>
